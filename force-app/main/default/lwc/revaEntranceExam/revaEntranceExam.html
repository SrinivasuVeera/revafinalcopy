                    <div class="slds-col slds-size_1-of-3">

                        <lightning-combobox

                            value={applyingRise}

                    </div>

                </div>

                            <lightning-combobox
                                label="Exam Date"
                                value={examDate}
                                options={examDateOptions}
                                onchange={handleExamDate}
                                required={showExamFields}>
                            </lightning-combobox>

                        </div>

                       <!- <div class="slds-col slds-size_1-of-3">

                            <lightning-combobox
                                label="Exam Type"
                                value={examType}
                                options={examTypeOptions}
                                onchange={handleExamType}
                                required={showExamFields}>
                            </lightning-combobox>

                        </div>->

                    </div>

                </template>-->

                <br/>

                <lightning-button
                    label="Submit"

    </template>

</template>
