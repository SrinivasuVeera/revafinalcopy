<template>
    <lightning-card title="Quick View" class="slds-truncate">
        <!-- Horizontal layout for QR code and booking details -->
        <div class="horizontal-layout">
            <!-- QR Code Section -->
            <div class="qr-code-container">
                <img src={urlQRCode} alt="Meal Booking Data" class="qr-code" onclick={handleQRCodeScanned}>
                

            </div>

            <!-- Booking Details Section -->
            <div class="booking-details">
                <p><strong>Name:</strong> {bookingForName}</p>
                <p><strong>SRN No:</strong> {bookingForSRN}</p>
                <p><strong>Phone:</strong> {bookingForPhone}</p>
                <img src={bookingForPhoto} alt="Passport Size Photo" class="photo">
            </div>
        </div>
    </lightning-card>
</template>
