<template>
    <!-- Full page background with image -->
    <div style={backgroundStyle}>

        <!-- Card — same structure and style as Login card -->
        <div style={cardStyle}>
            <div style={cardPaddingStyle}>

                <!-- Title: PASSWORD RESET -->
                <div style={titleRowStyle}>
                    <span style={titleTextStyle}>Now, Check Your Mail</span>
                </div>

                <!-- Red underline divider — same as login -->
                <div style={dividerStyle}></div>

                <!-- Info Paragraph 1 -->
                <p style={infoPara1Style}>
                    Check the email account associated with your user name for instructions on resetting your password. Remember to look in your spam folder, where automated messages sometimes filter. If you still can't log in, contact your administrator.
                </p>              

                <!-- Thin separator line -->
                <!-- <div style={lineDividerStyle}></div> -->
               

                <!-- Cancel link — centered -->
                <div style={cancelRowStyle}>
                    <a href="https://admission.reva.edu.in/s/login/" style={cancelLinkStyle}>Back to Login</a>
                </div>

            </div>
        </div>

    </div>
</template>
