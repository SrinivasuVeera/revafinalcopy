                    <h2 class="slds-modal__title">📢Announcement</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                  <h3 class="popup-title" style="font-weight: bold; text-align: center;">{popupTitle}</h3>
                    <lightning-formatted-rich-text value={announcementMessage}></lightning-formatted-rich-text>

                    <template if:true={fileName}>
                        <p style="margin-top: 1rem;">

                </div>
                <footer class="slds-modal__footer">
                    <lightning-button variant="neutral" label="Cancel" onclick={handleCancel}></lightning-button>
