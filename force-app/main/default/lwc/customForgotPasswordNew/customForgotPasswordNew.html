<template>
    <!-- Full page background with image -->
    <div style={backgroundStyle}>

        <!-- Card — same structure and style as Login card -->
        <div style={cardStyle}>
            <div style={cardPaddingStyle}>

                <!-- Title: PASSWORD RESET -->
                <div style={titleRowStyle}>
                    <span style={titleTextStyle}>Password Reset</span>
                </div>

                <!-- Red underline divider — same as login -->
                <div style={dividerStyle}></div>

                <!-- Info Paragraph 1 -->
                <p style={infoPara1Style}>
                    To reset your password, we'll need your username.
                    Username format will be 26415000241@reva.edu.in.
                </p>

                <!-- Info Paragraph 2 -->
                <p style={infoPara2Style}>
                    We'll send password reset instructions to the email
                    address associated with your account.
                </p>

                <!-- Thin separator line -->
                <div style={lineDividerStyle}></div>

                <!-- Username Field -->
                <div style={fieldWrapperStyle}>
                    <label style={labelStyle}>
                        <span style={reqStyle}>*</span>&nbsp;Username
                    </label>
                    <input
                        type="text"
                        style={inputStyle}
                        placeholder="Username" 
                        value={username}
                        onchange={handleUsernameChange}
                        name="resetUsername" />
                    <span style={hintTextStyle}>Eg.: 26415000241@reva.edu.in</span>
                </div>
                <!-- Validation Error Message -->
                <template if:true={errorMessage}>
                    <div class="error-msg">{errorMessage}</div>
                </template>
                <!-- Reset Password Button — full width blue -->
                <div style={btnRowStyle}>
                    <button style={resetBtnStyle} onclick={handleReset}>Reset Password</button>
                </div>

                <!-- Cancel link — centered -->
                <!-- <div style={cancelRowStyle}>
                    <a href="#" style={cancelLinkStyle}>Cancel</a>
                </div> -->

            </div>
        </div>

    </div>
</template>
