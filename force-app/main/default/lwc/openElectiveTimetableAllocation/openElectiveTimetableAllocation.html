<template>
    <lightning-card title="Open Elective Timetable" icon-name="standard:time_period">
        <!-- FORM: show when not loading and no results -->
        <template if:false={isLoading}>
            <template if:false={hasResults}>
                <div class="slds-p-around_medium">
                    <div class="slds-text-heading_medium slds-m-bottom_small">Choose day(s) & slot(s)</div>

                    <template for:each={preferences} for:item="pref" for:index="index">
                        <div key={pref.id} class="slds-grid slds-wrap slds-grid_align-spread slds-m-bottom_x-small slds-p-vertical_x-small slds-border_bottom">
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_4-of-12">
                                <lightning-combobox
                                    name="day"
                                    label="Day"
                                    value={pref.day}
                                    options={dayOptions}
                                    data-index={index}
                                    onchange={handleDayChange}>
                                </lightning-combobox>
                            </div>

                            <div class="slds-col slds-size_1-of-1 slds-medium-size_3-of-12">
                                <lightning-combobox
                                    name="slot"
                                    label="Slot"
                                    value={pref.slot}
                                    options={slotOptions}
                                    data-index={index}
                                    onchange={handleSlotChange}>
                                </lightning-combobox>
                            </div>

                            <div class="slds-col slds-size_1-of-1 slds-medium-size_2-of-12 slds-align_absolute-center slds-p-top_small">
                                <lightning-button-icon
                                    icon-name="utility:delete"
                                    alternative-text="Remove"
                                    title="Remove"
                                    data-index={index}
                                    onclick={removePair}>
                                </lightning-button-icon>
                            </div>
                        </div>
                    </template>

                    <div class="slds-m-top_small">
                        <lightning-button label="Add Preference Day" variant="neutral" onclick={addPreference}></lightning-button>
                        <lightning-button label="Save Preferences" variant="brand" class="slds-m-left_small" onclick={savePreferences}></lightning-button>
                    </div>
                </div>
            </template>
        </template>

        <!-- Loading -->
        <template if:true={isLoading}>
            <div class="slds-p-around_large slds-text-align_center">
                <lightning-spinner alternative-text="Loading timetable..." size="medium"></lightning-spinner>
                <div class="slds-m-top_small">Generating timetable — please wait...</div>
            </div>
        </template>

        <!-- Results -->
        <template if:true={hasResults}>
            <div class="slds-p-around_medium">
                <div class="slds-grid slds-align_absolute-center slds-m-bottom_medium">
                    <div class="slds-text-heading_small slds-m-right_small">Generated Timetable</div>
                    <lightning-button variant="neutral" label="Back to Preferences" onclick={resetToPreferences}></lightning-button>
                </div>

                <template for:each={weeklyEntries} for:item="dayEntry">
                    <div key={dayEntry.day} class="slds-m-bottom_large">
                        <div class="slds-grid slds-align-space slds-m-bottom_x-small">
                            <h3 class="slds-text-title_caps">📅 {dayEntry.day}</h3>
                            <div class="slds-text-title_bold slds-m-left_small">({dayEntry.entries.length} sessions)</div>
                        </div>

                        <table class="slds-table slds-table_cell-buffer slds-table_bordered slds-m-bottom_small">
                            <thead>
                                <tr class="slds-line-height_reset">
                                    <th scope="col">Group</th>
                                    <th scope="col">Course</th>
                                    <th scope="col">Time (IST)</th>
                                    <th scope="col">Professor</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={dayEntry.entries} for:item="sched">
                                    <tr key={sched.id}>
                                        <td>{sched.groupName} ({sched.parentSemesterName})</td>
                                        <td>{sched.courseName}</td>
                                        <td>{sched.formattedTime}</td>
                                        <td>{sched.professorName}</td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </template>
            </div>
        </template>
    </lightning-card>
</template>
