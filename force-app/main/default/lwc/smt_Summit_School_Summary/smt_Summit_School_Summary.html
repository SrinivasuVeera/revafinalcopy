<template>
    <lightning-card>
       <!-- SCREEN 1 : SCHOOL OVERALL -->
        <template if:true={isScreen1}>
            <div class="slds-p-around_large">

                <table class="slds-table slds-table_cell-buffer slds-table_bordered slds-table_col-bordered">
                    <thead>
                        <tr>
                            <th colspan="2" class="slds-text-align_center">
                                School Overall Performance
                            </th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <th>Target</th>
                            <td>{schoolData.target}</td>
                        </tr>
                        <tr>
                            <th>Achieved</th>
                            <td>{schoolData.achieved}</td>
                        </tr>
                        <tr>
                            <th>Percentage Achieved</th>
                            <td>{schoolData.percentage}%</td>
                        </tr>
                    </tbody>
                </table>

                <!-- Bottom Right Button -->
                <div class="slds-grid slds-grid_align-end slds-m-top_medium">
                    <lightning-button
                        label="View Teams"
                        variant="brand"
                        onclick={goToScreen2}>
                    </lightning-button>
                </div>

            </div>
        </template>



        <!-- SCREEN 2 : TEAMS -->
        <template if:true={isScreen2}>
            <div class="page-container">
                <lightning-button label="Back" onclick={goBack}></lightning-button>

                <h2 class="screen-title">Teams</h2>

                <table class="slds-table slds-table_bordered centered-table">
                    <thead>
                        <tr>
                            <th>Team Name</th>
                            <th>Target</th>
                            <th>Achieved</th>
                            <th>% Achieved</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template for:each={teams} for:item="team">
                            <tr key={team.id}>
                                <td>{team.name}</td>
                                <td>{team.target}</td>
                                <td>{team.achieved}</td>
                                <td>{team.percentage}%</td>
                                <td>
                                    <lightning-button
                                        label="Details"
                                        data-id={team.id}
                                        onclick={openTeam}>
                                    </lightning-button>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </template>

        <!-- SCREEN 3 : MONTHS -->
        <template if:true={isScreen3}>
            <div class="page-container">
                <lightning-button label="Back" onclick={goBack}></lightning-button>

                <h2 class="screen-title">Month-wise Performance</h2>

                <table class="slds-table slds-table_bordered centered-table">
                    <thead>
                        <tr>
                            <th>Month</th>
                            <th>Target</th>
                            <th>Achieved</th>
                            <th>% Achieved</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template for:each={months} for:item="month">
                            <tr key={month.id}>
                                <td>{month.name}</td>
                                <td>{month.target}</td>
                                <td>{month.achieved}</td>
                                <td>{month.percentage}%</td>
                                <td>
                                    <lightning-button
                                        label="Details"
                                        data-id={month.id}
                                        onclick={openMonth}>
                                    </lightning-button>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </template>

        <!-- SCREEN 4 : FACULTIES (FILTERED BY MONTH) -->
        <template if:true={isScreen4}>
            <div class="page-container">
                <lightning-button label="Back" onclick={goBack}></lightning-button>

                <h2 class="screen-title">Faculties - {selectedMonth}</h2>

                <table class="slds-table slds-table_bordered centered-table">
                    <thead>
                        <tr>
                            <th>Month</th>
                            <th>Faculty Name</th>
                            <th>Target</th>
                            <th>Achieved</th>
                            <th>% Achieved</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template for:each={filteredFaculties} for:item="fac">
                            <tr key={fac.id}>
                                <td>{fac.month}</td>
                                <td>{fac.name}</td>
                                <td>{fac.target}</td>
                                <td>{fac.achieved}</td>
                                <td>{fac.percentage}%</td>
                                <td>
                                    <lightning-button
                                        label="Details"
                                        data-id={fac.id}
                                        onclick={openFaculty}>
                                    </lightning-button>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </template>        
        
      
        <!-- SCREEN 5 : FACULTY DETAILS -->
        <template if:true={isScreen5}>
            <div class="slds-p-around_large">

                <h2 class="slds-text-heading_medium slds-m-bottom_medium">
                    Faculty Details – {selectedFacultyName}
                </h2>

                <table class="slds-table slds-table_cell-buffer slds-table_bordered slds-table_col-bordered">
                    <thead>
                        <tr>
                            <th>Section</th>
                            <th>Particular</th>
                            <th>Target</th>
                            <th>Achieved</th>
                            <th>% Achieved</th>
                            <th>Path</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template for:each={selectedFacultyDetails} for:item="row">
                            <tr key={row.id}>
                                <td>{row.section}</td>
                                <td>{row.particular}</td>
                                <td>{row.target}</td>
                                <td>{row.achieved}</td>
                                <td>{row.percentage}%</td>
                                <td>{row.path}</td>
                            </tr>
                        </template>
                    </tbody>
                </table>

                <!-- Bottom Right Back Button -->
                <div class="slds-grid slds-grid_align-end slds-m-top_medium">
                    <lightning-button
                        label="Back"
                        onclick={goBack}>
                    </lightning-button>
                </div>

            </div>
        </template>
    </lightning-card>
</template>
