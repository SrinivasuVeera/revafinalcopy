<template>
    <template if:true={isVactionData}>
        <h4> Approval History Details:</h4>
    </template>

    <template if:true={approvalHistories}>
        <section>
            <table class="table-text">
                <thead>
                    <tr>
                        <th>SL.No</th>
                        <th>Approve Date</th>
                        <th>Status</th>
                        <th>Approved By</th>
                        <th>Comment</th>
                    </tr>
                </thead>
                <tbody>
                    <template for:each={approvalHistories} for:item="approvalHistory">
                        <tr key={approvalHistory.Id}>
                            <td data-cell="Sl. No">
                                <p class="case-number pointer-hover">
                                    <strong>{approvalHistory.sNo}</strong>
                                </p>
                            </td>
                            <td data-cell="Created Date">
                                <strong>
                                    <lightning-formatted-date-time value={approvalHistory.createdDate} year="numeric"
                                        day="2-digit" month="long" hour="2-digit" minute="2-digit">
                                    </lightning-formatted-date-time>
                                </strong>
                            </td>
                            <td data-cell="Status">
                                <strong>{approvalHistory.status}</strong>
                            </td>
                            <td data-cell="Approved By">
                                <strong>{approvalHistory.actorName}</strong>
                            </td>
                            <td data-cell="Comment">
                                <strong>{approvalHistory.comments}</strong>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </section>
    </template>



    <!-- Back button functionality -->
    <template if:true={isVactionData}>
        <div class="slds-text-align_center slds-p-around_medium">
            <lightning-button class="slds-p-left_medium" variant="brand" label="Back to Home"
                onclick={handleBackVactingHistory}></lightning-button>
        </div>
    </template>
</template>
