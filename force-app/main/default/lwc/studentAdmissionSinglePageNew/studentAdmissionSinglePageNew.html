<template>
    <div class="banner" style={mobBackgroundStyle}>
        <div class="portal-background">
            <div class="container">
                <div class="text-overlay">
                    <div class="admission-card">

                        <template if:true={showSpinner}>
                            <div class="spinner-backdrop">
                                <lightning-spinner alternative-text="Processing payment..." size="medium"></lightning-spinner>
                                <p class="spinner-text">Processing your payment, please wait…</p>
                            </div>
                        </template>

                        <!-- Header -->
                        <div class="admission-header">
                            <div class="header-inline">
                                <span class="title-gradient">Admissions {propYear}</span>
                                <lightning-icon icon-name="utility:education" size="medium" class="education-icon"></lightning-icon>
                            </div>
                        </div>

                        <template if:false={showPaidView}>

                            <!-- First Name / Last Name -->
                            <div class="two-col">
                                <div>
                                    <lightning-input label="First Name" value={firstName} name="firstName"
                                        onchange={handleFirstNameChange} disabled={verifyEmail} required></lightning-input>
                                    <template if:true={validationErrors.firstName}>
                                        <div class="field-error">{validationErrors.firstName}</div>
                                    </template>
                                </div>
                                <div>
                                    <lightning-input label="Last Name" value={lastName} name="lastName"
                                        onchange={handleLastNameChange} disabled={verifyEmail} required></lightning-input>
                                    <template if:true={validationErrors.lastName}>
                                        <div class="field-error">{validationErrors.lastName}</div>
                                    </template>
                                </div>
                            </div>

                            <!-- Email -->
                            <div class="email-row">
                                <div class="email-field-wrap">
                                    <lightning-input label="Email" value={email} name="email"
                                        onchange={handleEmailChange} type="email" disabled={verifyEmail} required></lightning-input>
                                    <template if:true={validationErrors.email}>
                                        <div class="field-error">{validationErrors.email}</div>
                                    </template>
                                    <template if:true={validationErrors.emailVerified}>
                                        <div class="field-error">{validationErrors.emailVerified}</div>
                                    </template>
                                </div>
                                <template if:false={isVerifyEmailDisabled}>
                                    <lightning-button variant="destructive" label="Verify Email" onclick={sendEmailOtp}></lightning-button>
                                </template>
                            </div>

                            <!-- Email OTP -->
                            <template if:true={showEmailOTP}>
                                <template if:false={isEmailVerified}>
                                    <div class="otp-row">
                                        <lightning-input class="otp-input-small" max-length="6" label="Email OTP"
                                            value={emailOtp} onchange={handleEmailOtpChange} required={otpRequired}></lightning-input>
                                        <lightning-button variant="destructive" label="Verify OTP" onclick={verifyEmailOtp}></lightning-button>
                                        <lightning-button variant="destructive" label="Resend OTP" onclick={handleResendEmailOtp}></lightning-button>
                                    </div>
                                </template>
                                <template if:true={isEmailVerified}>
                                    <div class="slds-p-top_small slds-text-color_success slds-grid slds-grid_vertical-align-center">
                                        <lightning-icon icon-name="utility:check" alternative-text="Verified" variant="success" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                                        <strong>Email verified successfully!!!</strong>
                                    </div>
                                </template>
                                <template if:true={resendEmailOtpMessage}>
                                    <div class="slds-text-color_success slds-m-top_small">{resendEmailOtpMessage}</div>
                                </template>
                                <template if:true={emailOtpError}>
                                    <div class="slds-text-color_error slds-m-top_small">Invalid OTP. Please try again.</div>
                                </template>
                                <template if:true={emailExists}>
                                    <div class="slds-text-color_success slds-m-top_small">Registration Completed Already, Please Proceed With Payment</div>
                                    <lightning-button variant="destructive" label="Make Payment" onclick={PaymentPageNew} class="slds-m-top_medium" disabled={isPaymentClicked}></lightning-button>
                                </template>
                            </template>

                            <template if:false={emailExists}>

                                <!-- ══ CODE + MOBILE — same row ══ -->
                                <div class="code-mobile-row">

                                    <!-- Code Dropup — narrow -->
                                    <div class="code-col">
                                        <label class="dropup-label">
                                            <abbr class="slds-required" title="required">*</abbr>Code
                                        </label>
                                        <div class={phoneCodeTriggerClass} onclick={togglePhoneCodeDrop}>
                                            <span class={phoneCodeTextClass}>{phoneCodeLabelDisplay}</span>
                                            <span class="dropup-trigger-icon">
                                                <lightning-icon icon-name="utility:chevrondown" size="x-small"></lightning-icon>
                                            </span>
                                        </div>
                                        <template if:true={phoneCodeOpen}>
                                            <div class="dropup-list" style={dropStyle} role="listbox">
                                                <ul class="slds-listbox slds-listbox_vertical" role="presentation">
                                                    <template for:each={phoneCodeOptions} for:item="opt">
                                                        <li key={opt.value} class="slds-listbox__item" data-value={opt.value} onclick={selectPhoneCode}>
                                                            <span class="slds-media slds-listbox__option slds-listbox__option_plain slds-media_small" role="option">
                                                                <span class="slds-media__body">
                                                                    <span class="slds-truncate">{opt.label}</span>
                                                                </span>
                                                            </span>
                                                        </li>
                                                    </template>
                                                </ul>
                                            </div>
                                        </template>
                                    </div>

                                    <!-- Mobile Number -->
                                    <div class="mobile-col">
                                        <lightning-input label="Mobile Number" value={mobileNumber} name="mobileNumber"
                                            onchange={handleMobileChange} required></lightning-input>
                                    </div>

                                    <!-- Send OTP button -->
                                    <template if:false={otherCountry}>
                                        <template if:false={isSendOtpDisabled}>
                                            <lightning-button variant="destructive" label="Send OTP" onclick={sendOtp} ></lightning-button>
                                        </template>
                                    </template>
                                    <!-- disabled={isSendOtpDisabled} -->
                                </div>

                                <!-- Errors -->
                                <template if:true={mobileErrorMessage}>
                                    <div class="field-error">{mobileErrorMessage}</div>
                                </template>
                                <template if:true={mobileError}>
                                    <div class="field-error">{mobileError}</div>
                                </template>
                                <template if:true={validationErrors.mobileVerified}>
                                    <div class="field-error">{validationErrors.mobileVerified}</div>
                                </template>                                
                                <template if:true={validationErrors.phoneCode}>
                                    <div class="field-error">{validationErrors.phoneCode}</div>
                                </template>
                                <template if:true={validationErrors.mobileNumber}>
                                    <div class="field-error">{validationErrors.mobileNumber}</div>
                                </template>
                                <!-- Mobile OTP -->
                                <template if:true={showMobileOtp}>
                                    <template if:false={isVerified}>
                                        <div class="otp-row">
                                            <lightning-input label="Mobile OTP" value={otp} onchange={handleOtpChange} required={otpRequired}></lightning-input>
                                            <lightning-button variant="destructive" label="Verify OTP" onclick={verifyOtp} disabled={verifyPhone}></lightning-button>
                                            <lightning-button variant="destructive" label="Resend OTP" onclick={handleResendOtp} disabled={verifyPhone}></lightning-button>
                                        </div>
                                        <template if:true={resendOtpMessage}>
                                            <div class="slds-text-color_success slds-m-top_small">{resendOtpMessage}</div>
                                        </template>
                                        <template if:true={otpError}>
                                            <div class="slds-text-color_error slds-m-top_small">Invalid OTP. Please try again.</div>
                                        </template>
                                    </template>
                                    <template if:true={isVerified}>
                                        <div class="slds-p-top_small slds-text-color_success slds-grid slds-grid_vertical-align-center">
                                            <lightning-icon icon-name="utility:check" alternative-text="Verified" variant="success" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                                            <strong>Mobile Number verified successfully!</strong>
                                        </div>
                                        <template if:true={showSubmitMessage}>
                                            <div style="display:flex;align-items:center;gap:10px;margin-top:8px;">
                                                <span style="color:red;font-weight:bold;">Please click Submit button to continue</span>
                                            </div>
                                        </template>
                                    </template>
                                </template>

                                <!-- ══ CATEGORY ══ -->
                                <div class="form-row">
                                    <div class={categoryDropClass}>
                                        <label class="dropup-label">
                                            <abbr class="slds-required" title="required">*</abbr>Category
                                        </label>
                                        <div class={categoryTriggerClass} onclick={toggleCategoryDrop}>
                                            <span class={categoryTextClass}>{categoryLabelDisplay}</span>
                                            <span class="dropup-trigger-icon">
                                                <lightning-icon icon-name="utility:chevrondown" size="x-small"></lightning-icon>
                                            </span>
                                        </div>
                                        <template if:true={categoryOpen}>
                                            <div class="dropup-list" style={dropStyle} role="listbox">
                                                <ul class="slds-listbox slds-listbox_vertical" role="presentation">
                                                    <template for:each={categoryOptions} for:item="opt">
                                                        <li key={opt.value} class="slds-listbox__item" data-value={opt.value} onclick={selectCategory}>
                                                            <span class="slds-media slds-listbox__option slds-listbox__option_plain slds-media_small" role="option">
                                                                <span class="slds-media__body">
                                                                    <span class="slds-truncate">{opt.label}</span>
                                                                </span>
                                                            </span>
                                                        </li>
                                                    </template>
                                                </ul>
                                            </div>
                                        </template>
                                        <template if:true={validationErrors.category}>
                                            <div class="field-error">{validationErrors.category}</div>
                                        </template>
                                    </div>
                                </div>

                                <!-- ══ STATE ══ -->
                                <template if:true={showStatePicklist}>
                                    <div class="form-row">
                                        <div class={stateDropClass}>
                                            <label class="dropup-label">
                                                <abbr class="slds-required" title="required">*</abbr>State
                                            </label>
                                            <div class={stateTriggerClass} onclick={toggleStateDrop}>
                                                <span class={stateTextClass}>{stateLabelDisplay}</span>
                                                <span class="dropup-trigger-icon">
                                                    <lightning-icon icon-name="utility:chevrondown" size="x-small"></lightning-icon>
                                                </span>
                                            </div>
                                            <template if:true={stateOpen}>
                                                <div class="dropup-list" style={dropStyle} role="listbox">
                                                    <ul class="slds-listbox slds-listbox_vertical" role="presentation">
                                                        <template for:each={stateOptions} for:item="opt">
                                                            <li key={opt.value} class="slds-listbox__item" data-value={opt.value} onclick={selectState}>
                                                                <span class="slds-media slds-listbox__option slds-listbox__option_plain slds-media_small" role="option">
                                                                    <span class="slds-media__body">
                                                                        <span class="slds-truncate">{opt.label}</span>
                                                                    </span>
                                                                </span>
                                                            </li>
                                                        </template>
                                                    </ul>
                                                </div>
                                            </template>
                                            <template if:true={validationErrors.state}>
                                                <div class="field-error">{validationErrors.state}</div>
                                            </template>
                                        </div>
                                    </div>
                                </template>

                                <!-- ══ COUNTRY ══ -->
                                <template if:true={showCountryPicklist}>
                                    <div class="form-row">
                                        <div class={countryDropClass}>
                                            <label class="dropup-label">
                                                <abbr class="slds-required" title="required">*</abbr>Country
                                            </label>
                                            <div class={countryTriggerClass} onclick={toggleCountryDrop}>
                                                <span class={countryTextClass}>{countryLabelDisplay}</span>
                                                <span class="dropup-trigger-icon">
                                                    <lightning-icon icon-name="utility:chevrondown" size="x-small"></lightning-icon>
                                                </span>
                                            </div>
                                            <template if:true={countryOpen}>
                                                <div class="dropup-list" style={dropStyle} role="listbox">
                                                    <ul class="slds-listbox slds-listbox_vertical" role="presentation">
                                                        <template for:each={countryOptions} for:item="opt">
                                                            <li key={opt.value} class="slds-listbox__item" data-value={opt.value} onclick={selectCountry}>
                                                                <span class="slds-media slds-listbox__option slds-listbox__option_plain slds-media_small" role="option">
                                                                    <span class="slds-media__body">
                                                                        <span class="slds-truncate">{opt.label}</span>
                                                                    </span>
                                                                </span>
                                                            </li>
                                                        </template>
                                                    </ul>
                                                </div>
                                            </template>
                                            <template if:true={validationErrors.country}>
                                                <div class="field-error">{validationErrors.country}</div>
                                            </template>
                                        </div>
                                    </div>
                                </template>

                                <!-- ══ SCHOOL + PROGRAM ══ -->
                                <div class="two-col">
                                    <div>
                                        <div class={schoolDropClass}>
                                            <label class="dropup-label">
                                                <abbr class="slds-required" title="required">*</abbr>School
                                            </label>
                                            <div class={schoolTriggerClass} onclick={toggleSchoolDrop}>
                                                <span class={schoolTextClass}>{schoolLabelDisplay}</span>
                                                <span class="dropup-trigger-icon">
                                                    <lightning-icon icon-name="utility:chevrondown" size="x-small"></lightning-icon>
                                                </span>
                                            </div>
                                            <template if:true={schoolOpen}>
                                                <div class="dropup-list" style={dropStyle} role="listbox">
                                                    <ul class="slds-listbox slds-listbox_vertical" role="presentation">
                                                        <template for:each={schools} for:item="opt">
                                                            <li key={opt.value} class="slds-listbox__item" data-value={opt.value} onclick={selectSchool}>
                                                                <span class="slds-media slds-listbox__option slds-listbox__option_plain slds-media_small" role="option">
                                                                    <span class="slds-media__body">
                                                                        <span class="slds-truncate">{opt.label}</span>
                                                                    </span>
                                                                </span>
                                                            </li>
                                                        </template>
                                                    </ul>
                                                </div>
                                            </template>
                                            <template if:true={validationErrors.school}>
                                                <div class="field-error">{validationErrors.school}</div>
                                            </template>
                                        </div>
                                    </div>
                                    <div>
                                        <div class={programDropClass}>
                                            <label class="dropup-label">
                                                <abbr class="slds-required" title="required">*</abbr>Program
                                            </label>
                                            <div class={programTriggerClass} onclick={toggleProgramDrop}>
                                                <!-- <span class={programTextClass}>{programLabelDisplay}</span> -->
                                                <div class={programTextClass} style="max-width: 13ch;">{programLabelDisplay}</div>
                                                <span class="dropup-trigger-icon">
                                                    <lightning-icon icon-name="utility:chevrondown" size="x-small"></lightning-icon>
                                                </span>
                                            </div>
                                            <template if:true={programOpen}>
                                                <div class="dropup-list" style={dropStyle} role="listbox">
                                                    <ul class="slds-listbox slds-listbox_vertical" role="presentation">
                                                        <template for:each={programs} for:item="opt">
                                                            <li key={opt.value} class="slds-listbox__item" data-value={opt.value} onclick={selectProgram}>
                                                                <span class="slds-media slds-listbox__option slds-listbox__option_plain slds-media_small" role="option">
                                                                    <span class="slds-media__body">
                                                                        <span class="slds-truncate">{opt.label}</span>
                                                                    </span>
                                                                </span>
                                                            </li>
                                                        </template>
                                                    </ul>
                                                </div>
                                            </template>
                                            <template if:true={validationErrors.program}>
                                                <div class="field-error">{validationErrors.program}</div>
                                            </template>
                                        </div>
                                    </div>
                                </div>

                                <!-- Declaration -->
                                <div class="slds-m-top_medium slds-m-bottom_medium">
                                    <lightning-input type="checkbox"
                                        label="I authorise REVA University to contact me for updates and notifications."
                                        checked={declarationChecked} onchange={handleDeclarationChange} required>
                                    </lightning-input>
                                    <template if:true={validationErrors.declaration}>
                                        <div class="field-error">{validationErrors.declaration}</div>
                                    </template>
                                </div>

                                <template if:true={submitErrorMessage}>
                                    <div class="slds-text-color_error slds-m-top_small">{submitErrorMessage}</div>
                                </template>

                                <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center slds-m-top_medium">
                                    <div style="display:block!important;width:100%;">
                                        <template if:false={isSubmitting}>
                                            <lightning-button variant="destructive" label="Submit" onclick={submitApplication}></lightning-button>
                                        </template>
                                        <template if:true={isSubmitting}>
                                            <div style="display:flex;align-items:center;gap:10px;margin-top:10px;">
                                                <lightning-spinner alternative-text="Submitting" size="small"></lightning-spinner>
                                                <span style="color:red;font-weight:bold;">Thank you for the Registration please wait....</span>
                                            </div>
                                        </template>
                                    </div>
                                    <template if:false={disableRegisterPageLink}>
                                        <div style="text-align:right;display:block!important;width:100%;">
                                            <div class="already-registered">Already Registered,
                                                <a href="https://admission.reva.edu.in/s/login/" style={helperLinkStyle}>Sign-In Here</a>
                                            </div>
                                            <div class="already-registered">In Complete Registration
                                                <a href="javascript:void(0);" onclick={handleSignIn}>Click Here</a>
                                            </div>
                                        </div>
                                    </template>
                                </div>

                            </template>
                        </template>

                        <!-- Paid view -->
                        <template if:true={IsshowPaidView}>
                            <div class="slds-box slds-theme_default slds-m-top_small">
                                <div class="slds-text-heading_medium">Dear Applicant,</div>
                                <div class="slds-m-top_small slds-text-body_regular">You have already registered with REVA University.</div>
                                <div class="slds-m-top_large">
                                    <div class="slds-m-bottom_small"><span class="slds-text-color_brand slds-text-title_bold">School: </span><span class="slds-text-title_bold">{paidSchool}</span></div>
                                    <div class="slds-m-bottom_small"><span class="slds-text-color_brand slds-text-title_bold">Program: </span><span class="slds-text-title_bold">{paidProgram}</span></div>
                                    <div class="slds-m-bottom_small"><span class="slds-text-color_brand slds-text-title_bold">Application Number: </span><span class="slds-text-title_bold">{paidApplicationNumber}</span></div>
                                </div>
                                <div class="slds-m-top_medium slds-text-body_regular">{paidMessage}</div>
                                <span class="slds-text-title_bold">{addedMessage}</span>
                                <div class="already-registered slds-m-top_small">Already reset? Click here to log in to the ,
                                    <a href="https://admission.reva.edu.in/s/login/" style={helperLinkStyle}>Applicant Portal</a>
                                </div>
                            </div>
                        </template>

                        <template if:true={isPUCView}>
                            <span class="slds-text-title_bold">{addedMessage}</span>
                        </template>

                        <!-- Sign In Mode -->
                        <template if:true={isSignInMode}>
                            <div class="email-row">
                                <lightning-input label="Email" value={email} name="email"
                                    onchange={handleEmailChange} type="email" disabled={verifyEmail} required></lightning-input>
                                <template if:false={isVerifyEmailDisabled}>
                                    <lightning-button variant="destructive" label="Verify Email" onclick={sendEmailOtp}></lightning-button>
                                </template>
                            </div>
                            <template if:true={showEmailOTP}>
                                <template if:false={isEmailVerified}>
                                    <div class="otp-row">
                                        <lightning-input class="otp-input-small" max-length="6" label="Email OTP"
                                            value={emailOtp} onchange={handleEmailOtpChange} required={otpRequired}></lightning-input>
                                        <lightning-button variant="destructive" label="Verify OTP" onclick={verifyEmailOtp}></lightning-button>
                                        <lightning-button variant="destructive" label="Resend OTP" onclick={handleResendEmailOtp}></lightning-button>
                                    </div>
                                </template>
                                <template if:true={resendEmailOtpMessage}>
                                    <div class="slds-text-color_success slds-m-top_small">{resendEmailOtpMessage}</div>
                                </template>
                                <template if:true={emailOtpError}>
                                    <div class="slds-text-color_error slds-m-top_small">Invalid OTP. Please try again.</div>
                                </template>
                            </template>
                        </template>

                    </div>
                </div>
            </div>
        </div>
    </div>
</template>
