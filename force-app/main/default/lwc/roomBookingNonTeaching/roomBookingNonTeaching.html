<template>
    <div class="booking-container">
      <h1>Book ClassRoom/Laboratory Slot wise </h1>

      <lightning-card title="Booking Details" icon-name="standard:event">
        <div class="slds-p-around_medium">

          <!-- Single / Multiple toggle -->
          <div class="toggle-row">
            <lightning-button-group>
              <lightning-button label="Single Day"
                                variant={singleVariant}
                                onclick={selectSingle}></lightning-button>
              <lightning-button label="Multiple Days"
                                variant={multiVariant}
                                onclick={selectMultiple}></lightning-button>
            </lightning-button-group>
          </div>

          <!-- Dates -->
          <template if:true={isSingle}>
            <lightning-input type="date" label="Date" value={singleDate} min={today}
                            onchange={handleSingleDate}></lightning-input>
          </template>
          <template if:false={isSingle}>
            <div class="date-grid">
              <lightning-input type="date" label="Start Date" value={startDate} min={today}
                              onchange={handleStartDate}></lightning-input>
              <lightning-input type="date" label="End Date" value={endDate} min={startDate}
                              onchange={handleEndDate}></lightning-input>
            </div>
          </template>

          <!-- Block -->
          <div class="slds-m-top_small">
            <lightning-combobox
              name="block"
              label="Block"
              value={selectedBlock}
              placeholder="Select a Block"
              options={blockOptions}
              onchange={handleBlockChange}>
            </lightning-combobox>
            
          </div>

          <!-- Facilities (pills + combobox) -->
          <div class="slds-m-top_medium">
            <lightning-combobox
              name="facility"
              label="Select ClassRoom/ Laboratory"
              value={selectedFacility}
              placeholder="Select a facility"
              options={facilityOptions}
              onchange={handleFacilitySelect}>
            </lightning-combobox>

            <template if:true={selectedFacilities.length}>
              <div class="slds-m-top_small">
                <template for:each={selectedFacilities} for:item="f">
                  <lightning-pill key={f.value}
                                  label={f.label}
                                  name={f.value}
                                  onremove={handleRemoveFacility}>
                  </lightning-pill>
                </template>
              </div>
            </template>
          </div>

          <!-- Slots -->
          <div class="slds-m-top_medium">
            <label class="slds-form-element__label">Time Slots</label>

            <!-- Group checkboxes -->
            <lightning-input type="checkbox"
                            label="First Half (Slots 1,2,4,5)"
                            checked={isFirstHalfChecked}
                            onchange={handleFirstHalf}></lightning-input>

            <lightning-input type="checkbox"
                            label="Second Half (Slots 7,8,9)"
                            checked={isSecondHalfChecked}
                            onchange={handleSecondHalf}></lightning-input>

            <!-- Individual slot checkboxes -->
            <div class="slds-m-top_small">
              <template for:each={slotOptions} for:item="s">
                <lightning-input key={s.value}
                                type="checkbox"
                                label={s.label}
                                data-id={s.value}
                                checked={s.checked}
                                onchange={handleSlotChange}>
                </lightning-input>
              </template>
            </div>
          </div>

          <!-- Reason -->
          <lightning-textarea
            class="slds-m-top_small"
            label="Booking Reason"
            value={bookingReason}
            onchange={handleReasonChange}
            required>
          </lightning-textarea>

          <!-- Actions -->
          <div class="button-row slds-m-top_medium">
            <lightning-button variant="brand" label="NEXT" onclick={check}></lightning-button>
            <lightning-button variant="neutral" label="Reset" onclick={reset}></lightning-button>
          </div>
        </div>
      </lightning-card>
    </div>

    <!-- Facility Booking Conflict Popup -->
<template if:true={showFacilityConflictPopup}>
  <section role="dialog" class="slds-modal slds-fade-in-open">
    <div class="slds-modal__container">
      <header class="slds-modal__header">
        <h2 class="slds-text-heading_medium">Already Booked (Facility Booking)</h2>
      </header>
      <div class="slds-modal__content slds-p-around_medium">
        <template for:each={bookedSlotDetails} for:item="b">
          <div key={b.facilityName} class="slds-box slds-m-bottom_small">
            <p><b>Facility:</b> {b.facilityName} ({b.block})</p>
            <p><b>School:</b> {b.schoolName}</p>
            <p><b>Date:</b> {b.bookingDate} — <b>Slot:</b> {b.slotName}</p>
            <p><b>Booked By:</b> {b.bookedBy}</p>
          </div>
        </template>
      </div>
      <footer class="slds-modal__footer">
        <lightning-button variant="neutral" label="Cancel" onclick={closeFacilityConflict}></lightning-button>
      </footer>
    </div>
  </section>
  <div class="slds-backdrop slds-backdrop_open"></div>
</template>

<!-- Course Offering Conflict Popup -->
<template if:true={showConflictPopup}>
  <section role="dialog" class="slds-modal slds-fade-in-open">
    <div class="slds-modal__container">
      <header class="slds-modal__header">
        <h2 class="slds-text-heading_medium">Already Booked (Course Offering)</h2>
      </header>
      <div class="slds-modal__content slds-p-around_medium">
        <template for:each={bookedSlotDetails} for:item="b">
          <div key={b.scheduleId} class="slds-box slds-m-bottom_small">
            <p><b>Facility:</b> {b.facilityName} ({b.block})</p>
            <p><b>School:</b> {b.schoolName}</p>
            <p><b>Date:</b> {b.bookingDate} — <b>Slot:</b> {b.slotName}</p>
            <p><b>Booked By:</b> {b.bookedBy}</p>
        
        
         <template if:true={hasCapacities}>
          <p><b>Room Capacity:</b></p>
          <template for:each={facilityCapacities} for:item="fc">
            <p key={fc.key}>{fc.key} : {fc.value}</p>
          </template> </template></div></template>
      </div>
      <footer class="slds-modal__footer">
        <lightning-button variant="neutral" label="Cancel" onclick={closeConflict}></lightning-button>
        <template if:true={canOverride}>
          <lightning-button variant="brand" label="Continue & Save" onclick={overrideSave}></lightning-button>
        </template>
      </footer>
    </div>
  </section>
  <div class="slds-backdrop slds-backdrop_open"></div>
</template>



<!-- Success Popup -->
<template if:true={showSuccessPopup}>
  <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
    <div class="slds-modal__container">
      <header class="slds-modal__header">
        <h2 class="slds-text-heading_medium">Booking Status</h2>
      </header>
      <div class="slds-modal__content slds-p-around_medium">
        <p>{availabilityMessage}</p>

        <!-- Created count (only when >0) ->
        <template if:true={createdCount}>
          <p class="slds-m-top_small"><b>Created:</b> {createdCount}</p>
        </template>-->

        <!-- Room capacities — show if array has items ->
        <template if:true={facilityCapacities} for:each={facilityCapacities} for:item="fc">
          <p key={fc.key}><b>Room Capacity:</b> </p>
          <!- First entry prints header; subsequent entries will list normally.
               If you want header shown once, render header separately when length>0. ->
        </template>-->

        <!-- cleaner version: show header once and then list items -->
        <template if:true={hasCapacities}>
          <p><b>Room Capacity:</b></p>
          <template for:each={facilityCapacities} for:item="fc">
            <p key={fc.key}>{fc.key} : {fc.value}</p>
          </template>
        </template>

      </div>
      <footer class="slds-modal__footer">
        <lightning-button variant="neutral" label="Cancel" onclick={closeSuccess}></lightning-button>
        <lightning-button variant="brand" label="OK" onclick={handleSuccessOk}></lightning-button>
      </footer>
    </div>
  </section>
  <div class="slds-backdrop slds-backdrop_open"></div>
</template>

        <p>{availabilityMessage}</p>
      </div>
      <footer class="slds-modal__footer">
