<template>
    <template if:true={boolShowSpinner}>
        <lightning-spinner alternative-text="Loading" size="large"></lightning-spinner>
    </template>
    <div>
        <div class="row">
            <div class="slds-p-around_x-small">
                <lightning-combobox
                    label="Semester"
                    value={selectedSemester}
                    options={semesterOptions}
                    onchange={handleSemesterChange}>
                </lightning-combobox>
            </div>
            <div class="slds-p-around_x-small">
                <lightning-combobox name="IAType" label="IA Type" value={IATypesOptionSelected} placeholder="Select IA"
                    options={IATypesOptions} onchange={handleChangeIATypes} required></lightning-combobox>
            </div>
            <template if:true={isIA2Selected}>
                <div class="slds-text-color_destructive slds-p-around_small slds-text-body_regular">
                    <strong>Note:</strong> Before acknowledging IA marks, if there are any concerns, please contact the
                    respective faculty before {acknowledgmentClosingDate}.
                    Please acknowledge before the deadline or the system will automatically confirm your IA marks.

                </div>
            </template>
        </div><br>
        <div class="row  slds-scrollable">
            <template if:true={showIAMarks}>

                                                    {item.crsType}
                                                </th>
                                            </tr>

                                                <th>Course Name</th>

                                                <th>Seminar Max: {item.hedCourse.Seminar_Maximum_Marks__c}</th>
                                                <th>Assignment Max: {item.hedCourse.Assignment_Secured_Marks__c}</th>
                                                <th>Quiz Max: {item.hedCourse.Quiz_Maximum_Marks__c}</th>
                                                <th>Total Max: {item.hedCourse.Maximum_Internal_Marks__c}</th>

                                                    <th>Total IA Marks (IA1 + IA2)</th>
                                                    <th>IA Marks Acknowledgement</th>
                                                </template>
                                            </tr>
                                        </thead>

                                            <template for:each={item.list_IAMarks} for:item="course">

                                                            {course.Course_Offering__r.hed__Course__r.Name}

                                                        </template>
                                                    </td> -->

                                                <!-- <button class="modal-close" onclick={handleCloseModal}>❌</button> -->
